name: Restore Regression Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  restore-tests:
    name: Restore Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: test
      DATABASE_URL: ""
      BACKUP_ENABLED: "false"
      BACKUP_RUN_ON_START: "false"
      WHATSAPP_ENABLED: "false"
      WHATSAPP_DRY_RUN: "true"
      COOKIE_SECURE: "false"
      SESSION_SECRET: clinova-restore-ci-test-only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Configure isolated restore paths
        run: |
          echo "DATABASE_PATH=$RUNNER_TEMP/clinova-restore-ci-db.sqlite" >> "$GITHUB_ENV"
          echo "UPLOAD_DIR=$RUNNER_TEMP/clinova-restore-ci-uploads" >> "$GITHUB_ENV"
          echo "BACKUP_DIR=$RUNNER_TEMP/clinova-restore-ci-backups" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Check isolated SQLite connection
        run: npm run db:check

      - name: Run restore regression test
        run: npm run test:restore
