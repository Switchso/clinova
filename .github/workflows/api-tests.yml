name: API Regression Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      DATABASE_URL: ""
      DATABASE_PATH: ${{ runner.temp }}/clinova-api-ci-db.sqlite
      UPLOAD_DIR: ${{ runner.temp }}/clinova-api-ci-uploads
      BACKUP_DIR: ${{ runner.temp }}/clinova-api-ci-backups
      BACKUP_ENABLED: "false"
      BACKUP_RUN_ON_START: "false"
      WHATSAPP_ENABLED: "false"
      WHATSAPP_DRY_RUN: "true"
      COOKIE_SECURE: "false"
      SESSION_SECRET: clinova-api-ci-test-only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check isolated SQLite connection
        run: npm run db:check

      - name: Run API regression tests
        run: npm run test:api
