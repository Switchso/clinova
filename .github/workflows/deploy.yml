name: CI/CD Deploy Clinova

on:

  workflow_dispatch:

concurrency:
  group: clinova-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax checks
        run: |
          node --check server/app.js
          node --check server/db.js
          node --check server/config.js
          node --check server/backup.js
          node --check server/backup-scheduler.js
          node --check server/whatsapp.js
          node --check server/postgres/migrate-sqlite-to-postgres.js
          node --check client/app.js

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/clinova_deploy_key
          chmod 600 ~/.ssh/clinova_deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          test -n "$SSH_USER"
          ssh -i ~/.ssh/clinova_deploy_key \
            -p "${SSH_PORT:-22}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "APP_DIR='${APP_DIR:-/var/www/clinova}' BRANCH='main' HEALTH_URL='${HEALTH_URL:-http://127.0.0.1:3000/api/health}' bash deploy/update-from-github.sh"
