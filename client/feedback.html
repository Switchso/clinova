<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback - Clinova</title>
    <style>
      body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f6faf8;color:#183329;font-family:Arial,sans-serif;padding:18px}
      main{width:min(520px,100%);background:white;border:1px solid #dfeee6;border-radius:14px;box-shadow:0 18px 50px rgba(45,106,79,.14);padding:24px;display:grid;gap:16px}
      h1{margin:0;color:#2d6a4f;font-size:24px}.muted{color:#6b8c7b}.stars{display:flex;gap:8px;direction:ltr;justify-content:center}
      .stars button{width:46px;height:46px;border:1px solid #dfeee6;background:#fff;border-radius:12px;font-size:24px;cursor:pointer}
      .stars button.active{background:#d8f3dc;border-color:#52b788}textarea{min-height:120px;border:1px solid #dfeee6;border-radius:10px;padding:12px;font:inherit}
      button.submit{height:44px;border:0;border-radius:10px;background:#2d6a4f;color:white;font-weight:700;cursor:pointer}.done{font-size:18px;text-align:center;color:#2d6a4f}
    </style>
  </head>
  <body>
    <main id="app"><div class="muted">טוען...</div></main>
    <script>
      const token = new URLSearchParams(location.search).get("token") || "";
      let rating = 5;
      const app = document.getElementById("app");
      async function api(path, options = {}) {
        const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options, body: options.body ? JSON.stringify(options.body) : undefined });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Error");
        return data;
      }
      function render(row) {
        app.innerHTML = `<h1>נשמח לחוות דעתך</h1><div class="muted">${row.clientName || ""} · ${row.serviceName || ""} · ${row.date || ""} ${row.time || ""}</div><div class="stars">${[1,2,3,4,5].map(n => `<button type="button" data-rate="${n}" class="${n <= rating ? "active" : ""}">★</button>`).join("")}</div><textarea id="comment" placeholder="אפשר לכתוב הערה קצרה"></textarea><button class="submit" id="send">שליחה</button>`;
        app.querySelectorAll("[data-rate]").forEach((button) => button.onclick = () => { rating = Number(button.dataset.rate); render(row); });
        document.getElementById("send").onclick = async () => {
          await api(`/api/public/feedback/${encodeURIComponent(token)}`, { method: "POST", body: { rating, comment: document.getElementById("comment").value } });
          app.innerHTML = `<div class="done">תודה רבה, המשוב התקבל.</div>`;
        };
      }
      api(`/api/public/feedback/${encodeURIComponent(token)}`).then(render).catch((err) => app.innerHTML = `<div>${err.message}</div>`);
    </script>
  </body>
</html>
